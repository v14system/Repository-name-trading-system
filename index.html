<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>V16 PRO ELITE MAX</title>

<style>
body{
background:#0b0b0b;
color:#eee;
font-family:Arial;
padding:20px
}

.card{
background:#181818;
padding:20px;
margin-top:15px;
border-radius:10px
}

input,button{
padding:8px;
margin:5px
}

.green{color:#00ff88}
.red{color:#ff4444}
.yellow{color:#ffd700}

table{
width:100%;
border-collapse:collapse
}

td,th{
padding:6px;
border-bottom:1px solid #333;
font-size:13px
}

.small{font-size:12px;color:#777}

</style>
</head>

<body>

<h2>V16 PRO ELITE MAX 交易辅助系统</h2>

<input id="symbolInput" placeholder="BTCUSDT">
<button onclick="start()">启动</button>

<div id="panel" class="card"></div>

<div class="card">
<h3>胜率统计</h3>
<div id="stats"></div>
</div>

<div class="card">
<h3>信号历史</h3>

<table>

<thead>
<tr>
<th>时间</th>
<th>币种</th>
<th>信号</th>
<th>Entry</th>
<th>Stop</th>
<th>Target</th>
</tr>
</thead>

<tbody id="history"></tbody>

</table>

</div>

<script>

let symbol=""
let tradeWS=null
let depthWS=null

let price=0

let prices=[]
let cvd=0
let cvdHist=[]

let bidVol=0
let askVol=0

let oiHistory=[]
let fundingHistory=[]

let whaleCount=0

let lastHigh=0
let lastLow=0

let signalHistory=JSON.parse(localStorage.getItem("signals"))||[]

let trend5m="NEUTRAL"
let trend15m="NEUTRAL"
let trend1h="NEUTRAL"

function EMA(arr,p){

if(arr.length<p)return 0

let k=2/(p+1)

let ema=arr[arr.length-p]

for(let i=arr.length-p+1;i<arr.length;i++){

ema=arr[i]*k+ema*(1-k)

}

return ema

}

function ATR(period=14){

if(prices.length<period+1)return 0

let sum=0

for(let i=prices.length-period;i<prices.length;i++){

sum+=Math.abs(prices[i]-prices[i-1])

}

return sum/period

}

function imbalance(){

if(bidVol+askVol===0)return 0

return (bidVol-askVol)/(bidVol+askVol)

}

function analyzeOI(){

if(oiHistory.length<2)return 0

let last=oiHistory.at(-1)

let prev=oiHistory.at(-2)

return (last-prev)/prev*100

}

function detectMarketPhase(){

if(prices.length<30)return "数据不足"

let vol=Math.abs(prices.at(-1)-prices.at(-20))/price

if(vol<0.001)return "震荡"

if(vol>0.003)return "趋势"

return "过渡阶段"

}

function stopHunt(){

let atr=ATR()

let spike=Math.abs(prices.at(-1)-prices.at(-2))

return spike>atr*1.5

}

function liquidityTrap(){

let imb=imbalance()

if(Math.abs(imb)>0.4 && cvdHist.at(-1)<cvdHist.at(-5)){

return true

}

return false

}

function whaleDetect(qty){

if(qty>10){

whaleCount++

}

}

function multiTFScore(){

let score=0

if(trend5m==="BULL")score+=10
if(trend15m==="BULL")score+=10
if(trend1h==="BULL")score+=20

if(trend5m==="BEAR")score+=10
if(trend15m==="BEAR")score+=10
if(trend1h==="BEAR")score+=20

return score

}

async function loadKlines(tf){

let res=await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=${tf}&limit=100`)

let data=await res.json()

let closes=data.map(x=>parseFloat(x[4]))

let ema20=EMA(closes,20)
let ema60=EMA(closes,60)
let ema120=EMA(closes,120)

let p=closes.at(-1)

if(ema20>ema60 && ema60>ema120 && p>ema20)return "BULL"

if(ema20<ema60 && ema60<ema120 && p<ema20)return "BEAR"

return "NEUTRAL"

}

async function updateMultiTF(){

trend5m=await loadKlines("5m")
trend15m=await loadKlines("15m")
trend1h=await loadKlines("1h")

}

function recordSignal(sig,entry,stop,target){

let obj={
time:new Date().toLocaleString(),
symbol:symbol,
signal:sig,
entry:entry,
stop:stop,
target:target
}

signalHistory.push(obj)

if(signalHistory.length>200)signalHistory.shift()

localStorage.setItem("signals",JSON.stringify(signalHistory))

}

function calculateWinRate(){

let win=0
let lose=0

signalHistory.forEach(s=>{

if(price>=s.target && s.signal.includes("多"))win++
if(price<=s.target && s.signal.includes("空"))win++

if(price<=s.stop && s.signal.includes("多"))lose++
if(price>=s.stop && s.signal.includes("空"))lose++

})

let total=win+lose

let rate=total?((win/total)*100).toFixed(1):0

return{win,lose,rate}

}

function renderHistory(){

let html=""

signalHistory.slice(-20).reverse().forEach(s=>{

html+=`

<tr>

<td>${s.time}</td>
<td>${s.symbol}</td>
<td>${s.signal}</td>
<td>${s.entry.toFixed(2)}</td>
<td>${s.stop.toFixed(2)}</td>
<td>${s.target.toFixed(2)}</td>

</tr>

`

})

document.getElementById("history").innerHTML=html

}

function calculate(){

if(prices.length<50)return

let score=0

let imb=imbalance()

let oiChange=analyzeOI()

if(cvdHist.at(-1)>cvdHist.at(-5))score+=15
if(cvdHist.at(-1)<cvdHist.at(-5))score+=15

if(Math.abs(imb)>0.2)score+=15

if(Math.abs(oiChange)>2)score+=10

score+=multiTFScore()

let phase=detectMarketPhase()

if(phase==="趋势")score+=10

let signal="观望"

if(score>=120)signal="S级信号"
else if(score>=100)signal="A级信号"
else if(score>=80)signal="B级信号"
else if(score>=60)signal="C级信号"

let atr=ATR()

let entry=price
let stop=price-atr
let target=price+atr*2

let hunt=stopHunt()
let trap=liquidityTrap()

document.getElementById("panel").innerHTML=`

<h3>${symbol}</h3>

<p>价格: ${price}</p >

<p>市场阶段: ${phase}</p >

<p>评分: ${score.toFixed(0)}</p >

<p>信号: <b class="${signal.includes("S")||signal.includes("A")?"green":"yellow"}">${signal}</b></p >

<p>入场价: ${entry.toFixed(2)}</p >
<p>止损价: ${stop.toFixed(2)}</p >
<p>止盈价: ${target.toFixed(2)}</p >

<hr>

<p>CVD: ${cvd.toFixed(2)}</p >

<p>OI: ${oiHistory.at(-1)||0}</p >

<p>OI变化: ${oiChange.toFixed(2)}%</p >

<p>订单簿买量: ${bidVol.toFixed(2)}</p >
<p>订单簿卖量: ${askVol.toFixed(2)}</p >

<p>订单簿不平衡: ${(imb*100).toFixed(1)}%</p >

<hr>

<p>止损猎杀: ${hunt}</p >

<p>流动性陷阱: ${trap}</p >

<p>鲸鱼成交: ${whaleCount}</p >

<hr>

<p>多周期结构</p >

<p>5m: ${trend5m}</p >
<p>15m: ${trend15m}</p >
<p>1h: ${trend1h}</p >

<p class="small">V16 PRO ELITE MAX</p >

`

let stat=calculateWinRate()

document.getElementById("stats").innerHTML=

`胜: ${stat.win} | 负: ${stat.lose} | 胜率: ${stat.rate}%`

renderHistory()

}

function start(){

symbol=document.getElementById("symbolInput").value.toUpperCase()

if(tradeWS)tradeWS.close()
if(depthWS)depthWS.close()

prices=[]
cvdHist=[]
oiHistory=[]
whaleCount=0

tradeWS=new WebSocket(`wss://fstream.binance.com/ws/${symbol.toLowerCase()}@aggTrade`)

depthWS=new WebSocket(`wss://fstream.binance.com/ws/${symbol.toLowerCase()}@depth5@100ms`)

tradeWS.onmessage=(e)=>{

let d=JSON.parse(e.data)

price=parseFloat(d.p)

let qty=parseFloat(d.q)

whaleDetect(qty)

if(d.m)cvd-=qty
else cvd+=qty

prices.push(price)
cvdHist.push(cvd)

if(prices.length>1000){
prices.shift()
cvdHist.shift()
}

}

depthWS.onmessage=(e)=>{

let d=JSON.parse(e.data)

bidVol=d.bids.reduce((a,b)=>a+parseFloat(b[1]),0)

askVol=d.asks.reduce((a,b)=>a+parseFloat(b[1]),0)

}

setInterval(fetchOI,5000)

setInterval(updateMultiTF,20000)

setInterval(calculate,3000)

}

async function fetchOI(){

let r=await fetch(`https://fapi.binance.com/fapi/v1/openInterest?symbol=${symbol}`)

let d=await r.json()

oiHistory.push(parseFloat(d.openInterest))

if(oiHistory.length>50)oiHistory.shift()

}

</script>

</body>
</html>
